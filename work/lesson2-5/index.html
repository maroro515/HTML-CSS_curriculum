<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="expires" content="604800">
    <meta name="format-detection" content="email=no,telephone=no,address=no">
    <title>CONVICTION SHOP</title>
    <meta name="description" content="商品サイトです">
    <link rel="icon" href="./assets/images/favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <div class="l-wrapper">
      <main class="l-main">
        <section class="p-cataLog">
          <h1 class="p-cataLog__title">- CataLog -</h1>
          <h2 class="c-badge">PickUp</h2>
          <div  class="c-card">
            <div class="c-card__imgArea">
              <div  class="image-area">
                <img src="assets/images/lesson2/img_pickup.jpg" alt="スマートウォッチ">
              </div>
            </div>
            <div  class="c-card__body">
              <p  class="c-card__name">
                スマートウォッチ
                <img  src="assets/images/lesson2/logo_pickup.png"  alt="カートアイコン"  class="cart-icon">
              </p>
              <p  class="c-card__description">洗練されたデザインと最先端の機能を兼ね備えたスマートウォッチです。</p>
              <p  class="c-card__specs">
                <span class="c-card__specItem">カラー:モカグレー</span>
                <span class="c-card__specItem">サイズ：S/M/L</span>
                <span class="c-card__specItem">バッテリー:最大7日間</span>
              </p>
              <p  class="c-card__price">
                <span class="c-card__priceUnit">&yen;</span>
                <span class="c-card__priceNumber">19</span>
                <span class="c-card__priceUnit">,</span>
                <span class="c-card__priceNumber">800</span>
                <span class="c-card__priceUnit">(税込)</span>
              </p>
              <ul class="c-card__tags">
                <li class="c-card__tagItem"><a href="#">#おしゃれ</a></li>
                <li class="c-card__tagItem"><a href="#">#シンプル</a></li>
                <li class="c-card__tagItem"><a href="#">#普段使い</a></li>
              </ul>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
