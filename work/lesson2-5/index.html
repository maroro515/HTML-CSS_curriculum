<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="expires" content="604800">
    <meta name="format-detection" content="email=no,telephone=no,address=no">
    <title>CONVICTION SHOP</title>
    <meta name="description" content="商品サイトです">
    <link rel="icon" href="./assets/images/favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <main>
      <section class="cataLog">
        <h1>- CataLog -</h1>
        <h2 class="badge">PickUp</h2>
        <div  class="card">
          <div class="img">
            <div  class="image-area">
              <img src="assets/images/lesson2/img_pickup.jpg" alt="スマートウォッチ">
            </div>
          </div>
        <div  class="text-area">
          <p  class="product-name">
            スマートウォッチ
            <img  src="assets/images/lesson2/logo_pickup.png"  alt="カートアイコン"  class="cart-icon">
          </p>
          <p  class="description">洗練されたデザインと最先端の機能を兼ね備えたスマートウォッチです。</p>
          <p  class="specs">
            <span class="spec-item">カラー:モカグレー</span>
            <span class="spec-item">サイズ：S/M/L</span>
            <span class="spec-item">バッテリー:最大7日間</span>
          </p>
          <p  class="price">
            <span class="price-yen-tax">&yen;</span>
            <span class="price-number">19</span><span class="price-yen-tax">,</span><span class="price-number">800</span>
            <span class="price-yen-tax">(税込)</span>
          </p>
          <ul class="tags">
            <li><a href="#">#おしゃれ</a></li>
            <li><a href="#">#シンプル</a></li>
            <li><a href="#">#普段使い</a></li>
          </ul>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
