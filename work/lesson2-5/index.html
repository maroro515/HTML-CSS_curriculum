<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="expires" content="604800">
    <meta name="format-detection" content="email=no,telephone=no,address=no">
    <title>CONVICTION SHOP</title>
    <meta name="description" content="商品サイトです">
    <link rel="icon" href="./assets/images/favicon.ico">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <div class="l-wrapper">
      <main class="l-main">
        <section class="p-catalog">
          <h1 class="p-catalog__title">- CataLog -</h1>
          <h2 class="c-badge u-mb-16">PickUp</h2>
          <div  class="p-card">
            <div class="p-card__imgArea">
              <img src="assets/images/lesson2/img_pickup.jpg" alt="スマートウォッチ">
            </div>
            <div  class="p-card__body">
              <p  class="p-card__name">
                スマートウォッチ
                <img  src="assets/images/lesson2/logo_pickup.png"  alt="カートアイコン"  class="p-card__cartIcon">
              </p>
              <p  class="p-card__description">洗練されたデザインと最先端の機能を兼ね備えたスマートウォッチです。</p>
              <ul  class="p-card__specs">
                <li class="c-specItem u-mb-4">カラー：モカグレー</li>
                <li class="c-specItem u-mb-4">サイズ：S/M/L</li>
                <li class="c-specItem u-mb-4">バッテリー：最大7日間</li>
                <li class="c-specItem u-mb-4">充電時間：約2時間</li>
              </ul>
              <p  class="c-price">
                <span class="c-priceUnit">&yen;</span>
                19,800
                <span class="c-priceUnit">(税込)</span>
              </p>
              <ul class="p-card__tags">
                <li class="p-card__tagItem"><a href="#" class="c-hashTag">#おしゃれ</a></li>
                <li class="p-card__tagItem"><a href="#" class="c-hashTag">#シンプル</a></li>
                <li class="p-card__tagItem"><a href="#" class="c-hashTag">#普段使い</a></li>
              </ul>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
